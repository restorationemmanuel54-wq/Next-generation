<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora Deployment</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
    text-align:center;
}

section{
    padding:80px 20px;
    display:none;
}

#hero{
    display:block;
    height:100vh;
    background:linear-gradient(180deg,#000,#111);
}

h1{
    font-size:40px;
    margin-top:100px;
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:gold;
    font-weight:600;
    cursor:pointer;
    margin-top:20px;
}

input{
    padding:12px;
    width:250px;
    border-radius:10px;
    border:none;
    margin-top:15px;
}

.scroll-text{
    margin-top:120px;
    opacity:0.7;
    animation:float 2s infinite alternate;
}

@keyframes float{
    from{transform:translateY(0px)}
    to{transform:translateY(10px)}
}

#qrImage{
    width:250px;
    margin-top:20px;
}

#miniAI{
    position:fixed;
    bottom:30px;
    right:30px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:radial-gradient(circle,gold,orange);
    box-shadow:0 0 20px gold;
    animation:pulse 1.5s infinite;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px gold}
    50%{box-shadow:0 0 25px gold}
    100%{box-shadow:0 0 10px gold}
}
</style>
</head>

<body>

<!-- HERO -->
<section id="hero">
    <h1>Welcome to Nexora ⚡</h1>
    <p>Next-Generation Operations & Responsive AI</p>
    <div class="scroll-text">⬇ Scroll Down To Deploy ⬇</div>
    <br>
    <button onclick="goDeploy()">Initialize Deployment</button>
</section>

<!-- AUTH KEY -->
<section id="authSection">
    <h2>Enter Your Access Key</h2>
    <input type="text" id="authKey" placeholder="Enter your key">
    <br>
    <button onclick="validateKey()">Continue</button>
</section>

<!-- LOGIN CHOICE -->
<section id="loginChoice">
    <h2>Select Login Method</h2>
    <button onclick="startQR()">QR Login</button>
    <button onclick="startCode()">Code Login</button>
</section>

<!-- QR SECTION -->
<section id="qrSection">
    <h2>Scan QR Code</h2>
    <img id="qrImage" src="">
    <p id="qrStatus"></p>
</section>

<!-- CODE SECTION -->
<section id="codeSection">
    <h2>Enter Pairing Code</h2>
    <h1 id="pairCode"></h1>
    <p id="codeStatus"></p>
</section>

<!-- SESSION CONNECTED -->
<section id="connectedSection">
    <h2>✅ Bot Connected Successfully</h2>
    <p>Your Nexora instance is now live.</p>
</section>

<div id="miniAI"></div>

<script>
const socket = io();
let currentKey = "";

function showSection(id){
    document.querySelectorAll("section").forEach(sec=>sec.style.display="none");
    document.getElementById(id).style.display="block";
}

function goDeploy(){
    showSection("authSection");
}

function validateKey(){
    const key = document.getElementById("authKey").value;
    if(!key) return alert("Enter a valid key");
    currentKey = key;
    showSection("loginChoice");
}

function startQR(){
    showSection("qrSection");
    socket.emit("start-qr",{userId:currentKey});
}

function startCode(){
    showSection("codeSection");
    socket.emit("start-code",{userId:currentKey});
}

socket.on("qr",(data)=>{
    document.getElementById("qrImage").src = data;
});

socket.on("pairing-code",(code)=>{
    document.getElementById("pairCode").innerText = code;
});

socket.on("connected",()=>{
    showSection("connectedSection");
});

socket.on("status",(msg)=>{
    document.getElementById("qrStatus").innerText = msg;
    document.getElementById("codeStatus").innerText = msg;
});
</script>

</body>
</html>
