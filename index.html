<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora V2 | Hacker Console</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:black;
  font-family:monospace;
  color:#00ff99;
  overflow-x:hidden;
}

/* Scanline overlay */
body::after{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,150,0.05),
    rgba(0,255,150,0.05) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

/* Floating Hacker Image */
.hero img{
  width:100%;
  max-width:320px;
  border-radius:15px;
  box-shadow:0 0 40px #00ff99;
  animation: floatImg 4s ease-in-out infinite;
}

@keyframes floatImg{
  0%{transform:translateY(0);}
  50%{transform:translateY(-15px);}
  100%{transform:translateY(0);}
}

/* Glitch Title */
.glitch{
  font-size:32px;
  margin-top:25px;
  position:relative;
  color:#00ff99;
  animation: flicker 2s infinite alternate;
}

@keyframes flicker{
  0%{opacity:1;}
  50%{opacity:0.8;}
  100%{opacity:1;}
}

/* Subtext */
.subtext{
  margin-top:15px;
  font-size:15px;
  color:#00cc88;
  max-width:420px;
  margin-left:auto;
  margin-right:auto;
  line-height:1.6;
}

/* Scroll Indicator */
.scroll-down{
  margin-top:40px;
  font-size:14px;
  opacity:0.7;
  animation: blink 1.5s infinite;
}

@keyframes blink{
  50%{opacity:0.3;}
}

/* DEPLOY SECTION */
.deploy-section{
  margin-top:100px;
  text-align:center;
  padding-bottom:100px;
}

.deploy-btn{
  padding:15px 30px;
  border:1px solid #00ff99;
  background:black;
  color:#00ff99;
  cursor:pointer;
  font-size:16px;
  border-radius:10px;
  transition:0.3s;
  box-shadow:0 0 20px #00ff99 inset;
}

.deploy-btn:hover{
  background:#00ff99;
  color:black;
  box-shadow:0 0 30px #00ff99;
  transform:scale(1.08);
}
</style>
</head>

<body>

<div class="hero">

  <img src="https://i.postimg.cc/qqfKZcJ5/IMG-20260228-WA0002.png">

  <div class="glitch">
    NEXORA V2 :: PREMIUM CONSOLE
  </div>

  <div class="subtext">
    Initializing Secure Automation Framework...<br><br>
    Nexora V2 is not just a bot system.<br>
    It is a command-level WhatsApp automation engine.<br><br>
    Deploy securely. Authenticate instantly.<br>
    Control everything.
  </div>

  <div class="scroll-down">
    ▼ Scroll Down To Deploy ▼
  </div>

</div>


<div class="deploy-section">
  <button class="deploy-btn" onclick="showDeploy()">Initialize Deployment 🚀</button>
</div>


<script>
function showDeploy(){
  alert("Deployment system loading...");
  // Your existing deploy flow continues
}
</script>

</body>
</html>
