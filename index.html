<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora V2 Premium</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>

<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
    overflow-x:hidden;
    text-align:center;
}

section{
    padding:80px 20px;
    display:none;
}

#hero{
    display:block;
    height:100vh;
    background:linear-gradient(180deg,#000,#111);
}

h1{
    font-size:40px;
    margin-top:30px;
}

.scroll-text{
    margin-top:50px;
    opacity:0.7;
    animation:float 2s infinite alternate;
}

@keyframes float{
    from{transform:translateY(0px)}
    to{transform:translateY(10px)}
}

button{
    padding:12px 30px;
    border:none;
    border-radius:30px;
    background:gold;
    font-weight:600;
    cursor:pointer;
    margin-top:20px;
    transition: all 0.3s;
}

button:hover{
    transform:scale(1.05);
}

#miniAI{
    position:fixed;
    bottom:30px;
    right:30px;
    width:60px;
    height:60px;
    border-radius:50%;
    background:radial-gradient(circle,gold,orange);
    box-shadow:0 0 20px gold;
    animation:pulse 1.5s infinite;
    cursor:pointer;
}

@keyframes pulse{
    0%{box-shadow:0 0 10px gold}
    50%{box-shadow:0 0 25px gold}
    100%{box-shadow:0 0 10px gold}
}

#hero img{
    width:200px;
    border-radius:15px;
    margin-top:50px;
    box-shadow:0 0 20px gold;
}

input{
    padding:10px;
    border-radius:10px;
    border:none;
    margin:10px;
    width:250px;
}

#qrContainer img{
    margin-top:20px;
    width:250px;
}

#pairCode{
    margin-top:20px;
    font-weight:bold;
    color:gold;
}
</style>
</head>
<body>

<!-- HERO -->
<section id="hero">
    <img src="https://i.postimg.cc/qqfKZcJ5/IMG-20260228-WA0002.png" alt="Nexora Logo">
    <h1>Welcome to Nexora V2 Premium</h1>
    <div class="scroll-text">⬇ Scroll Down To Deploy ⬇</div>
    <br>
    <button onclick="goDeploy()">Initialize Deployment</button>
</section>

<!-- MINI AI -->
<div id="miniAI" title="Ask Nexora AI"></div>

<!-- DEPLOY SECTION -->
<section id="deploy">
    <h2>Login to Deploy</h2>
    <input id="userId" placeholder="Enter Username">
    <br>
    <button onclick="startQR()">Login with QR</button>
    <br><br>
    <input id="phone" placeholder="+234XXXXXXXXXX">
    <br>
    <button onclick="startCode()">Login with Code</button>
    <br><br>
    <div id="qrContainer"></div>
    <h3 id="pairCode"></h3>
    <p id="status"></p>
</section>

<script>
const socket = io();

/* ---------- SECTION CONTROL ---------- */
function showSection(id){
    document.querySelectorAll("section").forEach(sec=>sec.style.display="none");
    document.getElementById(id).style.display="block";
}

function goDeploy(){
    showSection("deploy");
}

/* ---------- QR LOGIN ---------- */
function startQR(){
    const userId = document.getElementById("userId").value;
    if(!userId) return alert("Enter username");
    socket.emit("start-qr",{ userId });
}

/* ---------- CODE LOGIN ---------- */
function startCode(){
    const userId = document.getElementById("userId").value;
    const phone = document.getElementById("phone").value;
    if(!userId || !phone) return alert("Enter username & phone number");
    socket.emit("start-code",{ userId, phone });
}

/* ---------- SOCKET LISTENERS ---------- */
socket.on("qr",(qrImage)=>{
    document.getElementById("qrContainer").innerHTML =
        `<img src="${qrImage}" alt="QR Code">`;
});

socket.on("pair-code",(code)=>{
    document.getElementById("pairCode").innerText =
        "Pairing Code: " + code;
});

socket.on("status",(msg)=>{
    document.getElementById("status").innerText = msg;
});

/* ---------- MINI AI ---------- */
document.getElementById("miniAI").addEventListener("click", async ()=>{
    const question = prompt("Ask Nexora AI about your bot:");
    if(!question) return;

    const res = await fetch("/ask-ai",{
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ question })
    });

    const data = await res.json();
    alert(data.answer);
});
</script>

</body>
</html>
