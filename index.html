<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora V2 | Hacker Console</title>

<style>
html,body{
  margin:0;
  padding:0;
  background:black;
  font-family:monospace;
  color:#00ff99;
  overflow-x:hidden;
}

/* Scanline overlay */
body::after{
  content:"";
  position:fixed;
  top:0; left:0;
  width:100%; height:100%;
  background: repeating-linear-gradient(
    to bottom,
    rgba(0,255,150,0.05),
    rgba(0,255,150,0.05) 2px,
    transparent 2px,
    transparent 4px
  );
  pointer-events:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px;
}

.hero img{
  width:100%;
  max-width:320px;
  border-radius:15px;
  box-shadow:0 0 40px #00ff99;
}

.deploy-btn{
  padding:15px 30px;
  border:1px solid #00ff99;
  background:black;
  color:#00ff99;
  cursor:pointer;
  font-size:16px;
  border-radius:10px;
  transition:0.3s;
  box-shadow:0 0 20px #00ff99 inset;
}

.deploy-btn:hover{
  background:#00ff99;
  color:black;
  box-shadow:0 0 30px #00ff99;
}

/* Sections */
.section{
  display:none;
  text-align:center;
  padding:40px 20px;
}

input{
  padding:12px;
  width:80%;
  border-radius:8px;
  border:none;
  margin-bottom:15px;
}

/* ===== MINI AI BUTTON ===== */

#aiButton{
  position:fixed;
  bottom:20px;
  right:20px;
  width:70px;
  height:70px;
  border-radius:50%;
  background:black;
  border:2px solid #00ff99;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  box-shadow:0 0 25px #00ff99;
  animation: pulseGlow 2s infinite alternate;
  z-index:1000;
}

#aiButton img{
  width:40px;
}

@keyframes pulseGlow{
  0%{ box-shadow:0 0 15px #00ff99; }
  100%{ box-shadow:0 0 40px #00ff99; }
}

/* AI PANEL */
#aiPanel{
  position:fixed;
  bottom:100px;
  right:-400px;
  width:300px;
  background:black;
  border:1px solid #00ff99;
  border-radius:12px;
  padding:15px;
  transition:0.4s;
  box-shadow:0 0 30px #00ff99;
  z-index:999;
}

#aiPanel.active{
  right:20px;
}

#aiPanel textarea{
  width:100%;
  height:60px;
  background:black;
  color:#00ff99;
  border:1px solid #00ff99;
  border-radius:6px;
  padding:8px;
}

#aiPanel button{
  margin-top:10px;
  width:100%;
  background:#00ff99;
  border:none;
  padding:8px;
  cursor:pointer;
  border-radius:6px;
}

#aiResponse{
  margin-top:10px;
  font-size:13px;
  color:#00cc88;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero" id="heroSection">
  <img src="https://i.postimg.cc/qqfKZcJ5/IMG-20260228-WA0002.png">
  <h2>NEXORA V2 :: PREMIUM CONSOLE</h2>
  <br>
  <button class="deploy-btn" onclick="showDeploy()">Initialize Deployment 🚀</button>
</div>

<!-- AUTH -->
<div class="section" id="authSection">
  <h2>Enter Authorization Key</h2>
  <input id="authKey" placeholder="Enter Authorization Key">
  <button class="deploy-btn" onclick="validateKey()">Continue</button>
</div>

<!-- QR -->
<div class="section" id="qrSection">
  <h2>Scan QR Code</h2>
  <img id="qrImg" width="250">
</div>

<!-- MINI AI BUTTON -->
<div id="aiButton" onclick="toggleAI()">
  <img src="https://cdn-icons-png.flaticon.com/512/4712/4712109.png">
</div>

<!-- AI PANEL -->
<div id="aiPanel">
  <textarea id="aiInput" placeholder="Ask about Nexora bot..."></textarea>
  <button onclick="askAI()">Send</button>
  <div id="aiResponse"></div>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

function showDeploy(){
  document.getElementById("heroSection").style.display="none";
  document.getElementById("authSection").style.display="block";
}

function validateKey(){
  const key = document.getElementById("authKey").value.trim();
  if(!key) return alert("Enter valid key.");

  document.getElementById("authSection").style.display="none";
  document.getElementById("qrSection").style.display="block";

  socket.emit("start-qr",{ userId:key });
}

socket.on("qr",(qrImage)=>{
  document.getElementById("qrImg").src = qrImage;
});

function toggleAI(){
  document.getElementById("aiPanel").classList.toggle("active");
}

async function askAI(){
  const input = document.getElementById("aiInput").value;
  if(!input) return;

  const res = await fetch("/ask-ai",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ question: input })
  });

  const data = await res.json();
  document.getElementById("aiResponse").innerText = data.answer;
}
</script>

</body>
</html>
