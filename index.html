<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nexora V2 Panel</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<script src="/socket.io/socket.io.js"></script>
<style>
body{
    margin:0;
    font-family:'Poppins',sans-serif;
    background:#000;
    color:#fff;
    text-align:center;
}
button{
    padding:12px 25px;
    border:none;
    border-radius:25px;
    background:gold;
    font-weight:600;
    cursor:pointer;
    margin:10px;
}
#codeDisplay{
    margin-top:15px;
    font-size:18px;
    color:#0f0;
    font-weight:bold;
}
#qrContainer img{
    margin-top:20px;
    width:250px;
}
#status{
    margin-top:15px;
    font-weight:bold;
    color:gold;
}
</style>
</head>
<body>

<h1>Nexora V2 Bot Panel</h1>

<section id="loginChoice">
    <h2>Login Method</h2>
    <button onclick="startQR()">QR Login</button>
    <br><br>
    <input id="phone" placeholder="+234XXXXXXXXXX">
    <button onclick="startCode()">Code Login</button>
    <div id="codeDisplay"></div>
    <div id="qrContainer"></div>
    <p id="status"></p>
</section>

<script>
const socket = io();

function startQR(){
    socket.emit("start-qr");
}

function startCode(){
    const phone = document.getElementById("phone").value.trim();
    if(!phone) return alert("Enter phone number");
    socket.emit("start-code", { phone });
}

// Show QR image
socket.on("qr", qrImage => {
    document.getElementById("qrContainer").innerHTML = `<img src="${qrImage}" alt="QR Code">`;
});

// Show 8-digit pairing code with copy button
socket.on("pair-code", code => {
    document.getElementById("codeDisplay").innerHTML = `
        8-digit Code: <span id="codeText">${code}</span>
        <button onclick="copyCode()">Copy</button>`;
});

function copyCode(){
    const text = document.getElementById("codeText").innerText;
    navigator.clipboard.writeText(text);
    alert("Code copied to clipboard!");
}

// Status messages
socket.on("status", msg => {
    document.getElementById("status").innerText = msg;
});
</script>

</body>
</html>
